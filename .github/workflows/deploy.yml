name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: 52.71.62.173
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: ~/deploy.sh
